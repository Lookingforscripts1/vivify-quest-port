name: Build Quest Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

# This gives the runner permission to upload the finished mod
permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup qpm-rust
      uses: Fernthedev/qpm-rust-action@main
      with:
        # FIXED: Removed 'qpm_version' and used the correct input names
        version: 'v0.1.1' 
        restore: true
        qpm_qmod: true

    - name: Build Mod
      run: |
        qpm sbuild
        qpm qmod build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vivify-Quest-Build
        # This path ensures it finds the .so and .qmod regardless of folder
        path: |
          ./**/*.so
          ./*.qmod
