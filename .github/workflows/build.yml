name: Build Quest Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup QPM
      # Using the updated action name and v1 tag
      uses: Fernthedev/qpm-action@v1
      with:
        workflow_token: ${{ secrets.GITHUB_TOKEN }}
        # Downloads the latest stable QPM release automatically
        restore: true 
        cache: true
        # This tells the action to resolve the NDK from your qpm.json
        resolve_ndk: true 

    - name: Build Mod
      run: |
        qpm sbuild
        qpm qmod build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vivify-Quest-Build
        path: |
          ./**/*.so
          ./*.qmod
